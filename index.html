<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>T. M. Riddle</title>
  </head>
  <body>
    <div id="page">
      <div id="paper-texture"></div>
      <div id="cold-light"></div>
      <canvas id="ink"></canvas>
      <div id="reply-layer"></div>
      <canvas id="presence-ink"></canvas>
      <canvas id="presence-sign"></canvas>
      <div id="presence"></div>
      <div id="vignette"></div>
      <div id="reject-flash"></div>
      <div id="memory-veil"></div>
      <canvas id="memory-ink"></canvas>
    </div>
    <!-- トムの文字の輪郭を紙の繊維へにじませる SVG フィルタ -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <filter id="ink-bleed" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="2" seed="7" />
        <feDisplacementMap in="SourceGraphic" scale="1.7" />
      </filter>
    </svg>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
